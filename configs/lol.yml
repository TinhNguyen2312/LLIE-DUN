data:
  root: "./data/LOLdataset"
  train_dir: "train" # root/train/{input_dir,target_dir}
  test_dir: "test" # root/test/{input_dir,target_dir}
  input_dir: "low" # folder of low-light images
  target_dir: "high"
  image_size: 256

model:
  num_stages: 8
  proxnet_hidden: 16
  proxnet_blocks: 2
  gamma: 2.2
  share_channel_weights: false

loss:
  charbonnier: 1.0
  charbonnier_reduction: "mean"
  perceptual: 0.05
  perceptual_criterion: "l2"
  perceptual_reduction: "mean"
  ssim: 0.2
  ssim_range: 1.0
  grad: 0.05
  fourier_real: 0.01
  fourier_imag: 0.01
  intermediate: 0.1
  intermediate_increasing_weight: false

training:
  model_dir: "outputs/fdunet_lol"
  optimization:
    optimizer:
      name: "adamw"
      lr: 0.0002
      weight_decay: 0.0001
      betas: [0.9, 0.999]
    scheduler:
      name: "cosineannealinglr"
      T_max: 800  
      eta_min: 0.0000001

evaluation:
  save_images: false